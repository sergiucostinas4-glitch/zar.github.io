
<style>
@import url('https://fonts.googleapis.com/css2?family=DM+Sans:wght@500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
.slide-bg{
  min-height:480px;
  background:#1a1a2e;
  border-radius:18px;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  gap:2rem;
  position:relative;
  overflow:hidden;
}
.slide-bg::before{
  content:'';
  position:absolute;inset:0;
  background:radial-gradient(ellipse at 30% 20%,#16213e 0%,transparent 60%),
             radial-gradient(ellipse at 80% 80%,#0f3460 0%,transparent 50%);
  pointer-events:none;
}
.stars{position:absolute;inset:0;pointer-events:none;}
.star{position:absolute;width:2px;height:2px;border-radius:50%;background:rgba(255,255,255,0.6);}
.dice{
  width:120px;height:120px;
  background:#fff;
  border-radius:18px;
  box-shadow:0 6px 32px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.9);
  display:grid;
  grid-template-columns:1fr 1fr 1fr;
  grid-template-rows:1fr 1fr 1fr;
  padding:15px;gap:6px;
  cursor:pointer;
  transition:transform 0.08s;
  position:relative;
}
.dice:hover{transform:translateY(-3px) scale(1.04);}
.dice:active{transform:scale(0.96);}
.dice.rolling{animation:roll 0.55s ease-out;}
@keyframes roll{
  0%  {transform:rotate(0deg) scale(1)}
  15% {transform:rotate(-18deg) scale(1.08)}
  35% {transform:rotate(22deg) scale(0.94)}
  55% {transform:rotate(-12deg) scale(1.06)}
  75% {transform:rotate(8deg) scale(0.97)}
  90% {transform:rotate(-4deg) scale(1.02)}
  100%{transform:rotate(0deg) scale(1)}
}
.dot{width:100%;height:100%;border-radius:50%;background:#1a1a2e;opacity:0;transition:opacity 0.2s;}
.dot.on{opacity:1;}
.roll-btn{
  font-family:'DM Sans',sans-serif;
  font-size:0.9rem;font-weight:500;
  color:#1a1a2e;background:#e0c97f;
  border:none;border-radius:50px;
  padding:0.65rem 2.2rem;
  cursor:pointer;letter-spacing:0.04em;
  transition:background 0.15s,transform 0.08s;
  position:relative;
}
.roll-btn:hover{background:#f0dc9a;}
.roll-btn:active{transform:scale(0.97);}
</style>

<div class="slide-bg">
  <div class="stars" id="stars"></div>
  <div class="dice" id="dice" onclick="rollDice()">
    <div class="dot" id="d1"></div><div class="dot" id="d2"></div><div class="dot" id="d3"></div>
    <div class="dot" id="d4"></div><div class="dot" id="d5"></div><div class="dot" id="d6"></div>
    <div class="dot" id="d7"></div><div class="dot" id="d8"></div><div class="dot" id="d9"></div>
  </div>
  <button class="roll-btn" onclick="rollDice()">🎲 Aruncă</button>
</div>

<script>
const DOTS={1:[5],2:[3,7],3:[3,5,7],4:[1,3,7,9],5:[1,3,5,7,9],6:[1,3,4,6,7,9]};
let rolling=false;
function showFace(n){for(let i=1;i<=9;i++)document.getElementById('d'+i).classList.toggle('on',DOTS[n].includes(i));}
function rollDice(){
  if(rolling)return;rolling=true;
  const dice=document.getElementById('dice');
  dice.classList.add('rolling');
  let t=0;
  const iv=setInterval(()=>{
    showFace(Math.ceil(Math.random()*6));t++;
    if(t>10){clearInterval(iv);showFace(Math.ceil(Math.random()*6));dice.classList.remove('rolling');rolling=false;}
  },50);
}
showFace(1);
const s=document.getElementById('stars');
for(let i=0;i<40;i++){const el=document.createElement('div');el.className='star';el.style.left=Math.random()*100+'%';el.style.top=Math.random()*100+'%';el.style.opacity=(Math.random()*0.5+0.1).toFixed(2);s.appendChild(el);}
</script>
